# 사용할 기본 모델을 정한다.
# 현재 값 `gpt-5.4-mini`는 속도와 품질의 균형을 노리는 설정이다.
# 대안 예시는 `gpt-5.4`, `gpt-5.4-mini`, `gpt-5.4-nano`이며, 더 큰 모델은 품질을 높이고 더 작은 모델은 응답을 빠르게 한다.
model = "gpt-5.4-mini"

# 일반 작업에서의 추론 강도를 정한다.
# 현재 값 `medium`은 과도한 시간 소비 없이 무난한 추론을 기대하는 수준이다.
# 대안은 보통 `low`, `medium`, `high`이며, 낮추면 더 빠르고 높이면 더 신중해진다.
model_reasoning_effort = "medium"

# 계획 단계에서 사용할 추론 강도를 정한다.
# 현재 값 `high`는 여러 단계를 먼저 따져보는 보수적 설정이다.
# 대안은 `low`, `medium`, `high`이며, 낮추면 계획은 빨라지지만 깊이가 줄고 높이면 검토가 더 촘촘해진다.
plan_mode_reasoning_effort = "high"

# 작업 공간의 파일 접근 범위를 정한다.
# 현재 값 `workspace-write`는 프로젝트 범위 안에서 수정하고 바깥은 건드리지 않도록 제한한다.
# 대안 예시는 `read-only`와 `danger-full-access`이며, 낮추면 안전성이 높고 높이면 자유도는 커진다.
sandbox_mode = "workspace-write"

# 변경 승인 방식을 정한다.
# 현재 값 `on-request`는 필요한 작업만 별도로 승인받는 방식이다.
# 대안 예시는 `never`와 `on-failure`이며, 더 엄격하면 안전성은 높아지고 더 느슨하면 작업 흐름은 빨라진다.
approval_policy = "on-request"

[agents]
# 동시에 돌릴 수 있는 에이전트 수를 정한다.
# 현재 값 `4`는 병렬 작업을 적당히 허용하는 수준이다.
# 더 작은 값은 충돌 가능성을 줄이고, 더 큰 값은 처리량을 높이지만 자원 사용도 늘어난다.
max_threads = 4

# 에이전트 호출이 얼마나 깊게 중첩될 수 있는지 정한다.
# 현재 값 `1`은 단순하고 예측 가능한 흐름을 유지한다.
# 더 큰 값은 복잡한 작업 분해에 유리하고, 더 작은 값은 제어가 쉬워진다.
max_depth = 1

# 하나의 작업이 실행될 수 있는 최대 시간을 초 단위로 정한다.
# 현재 값 `1800`은 30분 동안 충분히 큰 작업을 허용한다.
# 더 작은 값은 멈춤을 빨리 감지하고, 더 큰 값은 장기 작업에 유리하지만 지연도 길어진다.
job_max_runtime_seconds = 1800
